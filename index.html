<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben 10 Final Stream</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- IMPORTANT: Config file yahan load ho raha hai -->
    <script src="config.js"></script>
    <style>
        :root { --green: #00ff41; --dark: #000; }
        body { background: var(--dark); color: #fff; font-family: sans-serif; height: 100vh; margin: 0; display: flex; flex-direction: column; overflow: hidden; }

        /* --- LOGIN PAGE --- */
        #login-page {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #111;
        }
        .card { background: #222; padding: 30px; border: 1px solid #444; width: 90%; max-width: 350px; text-align: center; border-radius: 10px; }
        h2 { color: var(--green); margin: 0 0 20px 0; text-transform: uppercase; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; font-size: 1rem; box-sizing: border-box; }
        
        button { width: 100%; padding: 15px; margin-top: 15px; background: var(--green); border: none; color: #000; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 5px; }
        button:hover { background: #fff; }
        button.secondary { background: #333; color: #fff; margin-top: 10px; font-size: 0.9rem; padding: 12px; }
        button.secondary:hover { background: #555; }

        .input-group { text-align: left; margin-top: 15px; border-top: 1px solid #444; padding-top: 15px; display: none; }
        
        /* --- STREAM PAGE --- */
        #stream-page { display: none; flex: 1; flex-direction: column; }
        
        .top-bar { height: 40px; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .status-dot { width: 8px; height: 8px; background: #555; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-dot.live { background: var(--green); }
        
        .video-area { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .screen { width: 100%; max-width: 900px; aspect-ratio: 16/9; background: #000; border: 1px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        video { width: 100%; height: 100%; object-fit: contain; }

        .controls { padding: 15px; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; gap: 15px; border-top: 1px solid #222; }
        
        /* Season Select Dropdown (New) */
        .season-selector { width: 80%; max-width: 500px; display: none; }
        select { width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: #fff; font-size: 1rem; }
        
        .url-box { width: 80%; max-width: 500px; display: none; } /* Manual URL hide kar diya, dropdown use hoga */
        .url-input { width: 100%; padding: 8px; background: #000; border: 1px solid #333; color: #fff; }
        .play-btn { margin-top: 5px; width: 100%; background: var(--green); color: #000; border: none; padding: 8px; cursor: pointer; font-weight: bold; }

        .btn-group { display: flex; gap: 10px; }
        .ctrl-btn { background: #222; border: 1px solid #444; color: #fff; padding: 8px 15px; cursor: pointer; }
        .ctrl-btn:hover { border-color: var(--green); color: var(--green); }

        @media (max-width: 600px) { .screen { height: 40vh; } }
    </style>
</head>
<body>

    <!-- 1. LOGIN -->
    <div id="login-page">
        <div class="card">
            <h2>Ben 10 Theater</h2>
            <button onclick="showHost()">HOST STREAM</button>
            <button class="secondary" onclick="showJoin()">JOIN STREAM</button>

            <div id="host-pass-box" class="input-group">
                <label>Password:</label>
                <input type="password" id="host-pass" placeholder="••••••••">
                <button onclick="verifyHost()">LOGIN</button>
                <button class="secondary" onclick="cancelLogin()">Back</button>
            </div>

            <div id="join-id-box" class="input-group">
                <label>Host ID:</label>
                <input type="text" id="join-id" placeholder="Paste ID here...">
                <button onclick="connectToHost()">JOIN</button>
                <button class="secondary" onclick="cancelLogin()">Back</button>
            </div>
        </div>
    </div>

    <!-- 2. STREAM -->
    <div id="stream-page">
        <div class="top-bar">
            <div><span class="status-dot" id="dot"></span> <span id="conn-status">Offline</span></div>
            <div id="viewer-count">Viewers: 0</div>
        </div>

        <div class="video-area">
            <div class="screen">
                <video id="main-video" controls></video>
            </div>
        </div>

        <div class="controls">
            <!-- Season Dropdown (Host ke liye) -->
            <div class="season-selector" id="season-tools">
                <select id="season-select" onchange="playSelectedSeason()">
                    <option value="">-- Select Season --</option>
                    <!-- JS se options aayenge -->
                </select>
                <div style="font-size:0.8rem; color:#888; margin-top:5px;">Season change karega aur sabko dikhega.</div>
            </div>

            <div class="btn-group">
                <button class="ctrl-btn" onclick="syncAction('play')">▶</button>
                <button class="ctrl-btn" onclick="syncAction('pause')">⏸</button>
                <button class="ctrl-btn" onclick="syncAction('next')">Next</button>
            </div>
        </div>
    </div>

    <script>
        let peer = null;
        let connections = [];
        let isHost = false;
        // Password ab config.js se aayega
        
        const loginPage = document.getElementById('login-page');
        const streamPage = document.getElementById('stream-page');
        const video = document.getElementById('main-video');
        const connStatus = document.getElementById('conn-status');
        const statusDot = document.getElementById('dot');
        const seasonTools = document.getElementById('season-tools');
        const viewerCount = document.getElementById('viewer-count');
        const seasonSelect = document.getElementById('season-select');

        // Populate Season Dropdown
        function populateSeasons() {
            seasonList.forEach((season, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.text = season.name;
                seasonSelect.appendChild(option);
            });
        }

        // Init Peer
        function initPeer() {
            peer = new Peer(null, { debug: 0 });

            peer.on('open', (id) => {
                if(isHost) {
                    connStatus.innerText = "Hosting: " + id;
                    statusDot.classList.add('live');
                    viewerCount.innerText = "Viewers: 1";
                }
            });

            peer.on('connection', (conn) => {
                connections.push(conn);
                conn.on('open', () => {
                    if(isHost) viewerCount.innerText = "Viewers: " + (connections.length + 1);
                });
                conn.on('data', (data) => {
                    if(data.action === 'play') video.play();
                    if(data.action === 'pause') video.pause();
                    if(data.action === 'loadUrl') {
                        video.src = data.url;
                        video.play();
                    }
                    if(data.action === 'selectSeason') {
                        seasonSelect.selectedIndex = data.index;
                        const season = seasonList[data.index];
                        video.src = season.url;
                        video.play();
                    }
                });
            });
        }

        // UI Logic
        function showHost() {
            document.querySelector('#host-pass-box').style.display = 'block';
            document.querySelector('#join-id-box').style.display = 'none';
        }

        function showJoin() {
            document.querySelector('#join-id-box').style.display = 'block';
            document.querySelector('#host-pass-box').style.display = 'none';
        }

        function cancelLogin() {
            document.querySelector('#host-pass-box').style.display = 'none';
            document.querySelector('#join-id-box').style.display = 'none';
        }

        function verifyHost() {
            if(document.getElementById('host-pass').value === hostPassword) {
                isHost = true;
                loginPage.style.display = 'none';
                streamPage.style.display = 'flex';
                seasonTools.style.display = 'block'; // Dropdown dikhao
                populateSeasons(); // Dropdown bhar lo
                initPeer();
            } else {
                alert("Wrong Password!");
            }
        }

        function connectToHost() {
            const id = document.getElementById('join-id').value;
            if(!id) return alert("ID daalo!");

            isHost = false;
            loginPage.style.display = 'none';
            streamPage.style.display = 'flex';
            initPeer();

            peer.on('open', () => {
                const conn = peer.connect(id);
                connections.push(conn);
                conn.on('open', () => {
                    connStatus.innerText = "Connected";
                    statusDot.classList.add('live');
                });
            });
        }

        // Actions
        function syncAction(action) {
            if(action === 'play') video.play();
            if(action === 'pause') video.pause();

            if(isHost) {
                connections.forEach(c => c.send({ action: action }));
            }
        }

        // New: Season Change Logic
        function playSelectedSeason() {
            const index = seasonSelect.value;
            if(index === "") return;

            const season = seasonList[index];
            if(!season.url) {
                alert("Is season ka link config.js me nahi hai!");
                return;
            }

            video.src = season.url;
            video.play();

            if(isHost) {
                connections.forEach(c => c.send({ action: 'selectSeason', index: index }));
            }
        }
    </script>
</body>
</html>
