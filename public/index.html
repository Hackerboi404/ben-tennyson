<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben 10 Simple Test</title>
    <style>
        :root {
            --primary-green: #00ff00;
            --bg-black: #050505;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-black); color: white; text-align: center; padding: 20px; }
        
        h1 { color: var(--primary-green); text-transform: uppercase; margin-bottom: 20px; }
        
        video {
            width: 100%;
            max-width: 600px;
            border: 2px solid var(--primary-green);
            border-radius: 10px;
            background: #000;
        }
        
        .btn {
            display: block;
            margin: 20px auto;
            padding: 15px 30px;
            background: var(--primary-green);
            color: black;
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 5px;
        }
        
        .status { color: #888; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>Ben 10 Stream Test</h1>

    <!-- YEH TEST VIDEO CODE KE ANDAR HI HAI. LINK KI ZAROORAT NAHI -->
    <video id="myVideo" controls>
        <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <button class="btn" onclick="playVideo()">▶ Play Video</button>

    <div class="status" id="statusText">Status: Ready</div>

    <script>
        const video = document.getElementById('myVideo');
        const status = document.getElementById('statusText');

        function playVideo() {
            status.innerText = "Status: Playing...";
            video.play().then(() => {
                status.innerText = "Status: Playing Successfully ✅";
            }).catch(error => {
                console.error("Error:", error);
                status.innerText = "Status: Error - Check Console ❌";
                alert("Video play nahi hui. Error: " + error.name);
            });
        }
    </script>

</body>
</html>
